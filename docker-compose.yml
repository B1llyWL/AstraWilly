version: '3.8'

services:
  db:
    image: postgres:15
    container_name: astrawilly_db
    environment:
      POSTGRES_DB: astrawilly
      POSTGRES_USER: astrawilly_user
      POSTGRES_PASSWORD: secure_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data: